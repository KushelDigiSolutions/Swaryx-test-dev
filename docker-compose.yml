services:

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "5000:5000"
    env_file:
      - .env

  auth-service:
    build:
      context: .
      dockerfile: ./auth-services/Dockerfile
    container_name: auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./auth-services/.env
    depends_on:
      - gateway

  user-service:
    build:
      context: ./user-services
    container_name: user-service
    ports:
      - "5002:5002"
    env_file:
      - ./user-services/.env
    depends_on:
      - auth-service

  subscription-service:
    build:
      context: ./subscription-service
    container_name: subscription-service
    ports:
      - "5003:5003"
    env_file:
      - ./subscription-service/.env
    depends_on:
      - auth-service

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    ports:
      - "5004:5004"
    env_file:
      - ./notification-service/.env
    depends_on:
      - auth-service
